                st.session_state.current_aura = {"aura": "Nienazwane Echo", "quote": "Cisza mówi najwięcej."}

    aura = st.session_state.current_aura
    st.markdown(f"""
    <div class="card">
        <div style="font-size:0.7rem; letter-spacing:0.4rem; color:#475569; margin-bottom:15px;">TWOJA AURA</div>
