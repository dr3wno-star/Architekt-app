# =========================================================
# 1. DIAGNOSTYKA I POBIERANIE KLUCZY
# =========================================================

def load_secrets():
    """Próbuje załadować klucze i zwraca status dla użytkownika."""
    data = {
        "gemini": st.secrets.get("GEMINI_KEY"),
        "firebase": st.secrets.get("FIREBASE_SERVICE_ACCOUNT"),
        "errors": []
    }
    if not data["gemini"]:
        data["errors"].append("Brak GEMINI_KEY w secrets.toml")
    if not data["firebase"]:
        data["errors"].append("Brak FIREBASE_SERVICE_ACCOUNT w secrets.toml")
    return data

SECRETS_DATA = load_secrets()
API_KEY = SECRETS_DATA["gemini"]

# =========================================================
# 2. KONFIGURACJA STRONY
# =========================================================

st.set_page_config(
    page_title="SZEPT",
    page_icon="🌙",
    layout="centered"
)

@st.cache_resource
def init_db():
    if not SECRETS_DATA["firebase"]:
        return None
    try:
        creds_info = json.loads(SECRETS_DATA["firebase"])
        creds = service_account.Credentials.from_service_account_info(creds_info)
        db = firestore.Client(credentials=creds, project=creds_info['project_id'])
        return db
    except Exception as e:
        st.error(f"Błąd Firestore: {e}")
        return None

db = init_db()
app_id = "szept-c417f"

